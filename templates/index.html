<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow Pro | Task & User Manager</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <div class="logo">
          <i class="fas fa-tasks"></i>
          <h1>SalleWorks <span>Pro</span></h1>
        </div>
        <p class="subtitle">
          Task & User Management System Universidad La Salle
        </p>
      </div>

      <!-- Statistics -->
      <div class="stats">
        <div class="stat-card">
          <i class="fas fa-list-check"></i>
          <div>
            <h3 id="totalTasks">0</h3>
            <p>Total Tasks</p>
          </div>
        </div>
        <div class="stat-card">
          <i class="fas fa-check-circle"></i>
          <div>
            <h3 id="completedTasks">0</h3>
            <p>Completed</p>
          </div>
        </div>
        <div class="stat-card">
          <i class="fas fa-users"></i>
          <div>
            <h3 id="totalUsers">0</h3>
            <p>Total Users</p>
          </div>
        </div>
      </div>

      <!-- Main Content - Two Columns -->
      <div class="dashboard">
        <!-- Tasks Section -->
        <div class="section">
          <div class="section-header">
            <i class="fas fa-check-square"></i>
            <h2>Task Manager</h2>
          </div>

          <!-- Add Task Form -->
          <div class="form-card">
            <h3><i class="fas fa-plus-circle"></i> New Task</h3>
            <form id="taskForm">
              <div class="input-group">
                <input
                  type="text"
                  id="taskContent"
                  placeholder="What needs to be done?"
                  required
                />
                <button type="submit" class="btn-primary">
                  <i class="fas fa-plus"></i> Add Task
                </button>
              </div>
            </form>
          </div>

          <!-- Tasks List -->
          <div class="list-container">
            <h3><i class="fas fa-list"></i> Your Tasks</h3>
            <div id="tasksList" class="tasks-list">
              <div class="loading">Loading tasks...</div>
            </div>
          </div>
        </div>

        <!-- Users Section -->
        <div class="section">
          <div class="section-header">
            <i class="fas fa-users"></i>
            <h2>User Manager</h2>
          </div>

          <!-- Add User Form -->
          <div class="form-card">
            <h3><i class="fas fa-user-plus"></i> New User</h3>
            <form id="userForm">
              <div class="form-row">
                <div class="input-group">
                  <i class="fas fa-user"></i>
                  <input
                    type="text"
                    id="userName"
                    placeholder="First Name"
                    required
                  />
                </div>
                <div class="input-group">
                  <i class="fas fa-user"></i>
                  <input
                    type="text"
                    id="userLastname"
                    placeholder="Last Name"
                    required
                  />
                </div>
              </div>
              <div class="form-row">
                <div class="input-group">
                  <i class="fas fa-city"></i>
                  <input type="text" id="userCity" placeholder="City" />
                </div>
                <div class="input-group">
                  <i class="fas fa-globe"></i>
                  <input type="text" id="userCountry" placeholder="Country" />
                </div>
                <div class="input-group">
                  <i class="fas fa-mail-bulk"></i>
                  <input
                    type="text"
                    id="userPostalCode"
                    placeholder="Postal Code"
                  />
                </div>
              </div>
              <button type="submit" class="btn-primary">
                <i class="fas fa-user-plus"></i> Create User
              </button>
            </form>
          </div>

          <!-- Users List -->
          <div class="list-container">
            <h3><i class="fas fa-address-book"></i> Registered Users</h3>
            <div id="usersList" class="users-list">
              <div class="loading">Loading users...</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
